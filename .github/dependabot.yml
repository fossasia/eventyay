version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    ignore:
      - dependency-name: "django"
        versions: [">=6.0.0"]
      - dependency-name: "stripe"
        versions: [">=11.4.0"]
      # Ignore all setuptools updates; issue is not version-specific.
      # Can be removed once Dependabot handles no-op uv updates.
      - dependency-name: "setuptools"

  - package-ecosystem: "npm"
    directory: "/webapps/video"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/webapps/schedule"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/webapps/schedule-editor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/webapps/webcheckin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

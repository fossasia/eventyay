name: PR Quality Reminder

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - edited

permissions:
  contents: none
  pull-requests: read
  issues: write

jobs:
  remind-pr-checklist:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Check screenshots and linked issues in PR
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const marker = '<!-- pr-quality-reminder -->';
            const legacyMarker = '<!-- screenshot-reminder -->';

            let alreadyCommented = false;
            const perPage = 50;
            let page = 1;

            while (true) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: perPage,
                page,
              });

              if (!comments || comments.length === 0) {
                break;
              }

              if (
                comments.some(
                  (comment) =>
                    comment.user?.type === 'Bot' &&
                    (comment.body?.includes(marker) || comment.body?.includes(legacyMarker))
                )
              ) {
                alreadyCommented = true;
                break;
              }

              if (comments.length < perPage) {
                break;
              }

              page += 1;
            }
            if (alreadyCommented) {
              core.info('Reminder already posted on this PR.');
              return;
            }

            const hasMarkdownImage = /!\[[^\]]*\]\([^)]+\)/i.test(body);
            const hasHtmlImage = /<img\s+[^>]*src=["'][^"']+["'][^>]*>/i.test(body);
            const hasImageUrl =
              /https?:\/\/[^\s)]+?\.(?:png|jpe?g|gif|webp|svg|mp4|mov)(?:[?#][^\s)]*)?/i.test(body);

            const hasScreenshotInBody =
              hasMarkdownImage ||
              hasHtmlImage ||
              hasImageUrl;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const visualExtensions = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg', '.mp4', '.mov'];
            const hasVisualFileInDiff = files.some((file) =>
              visualExtensions.some((ext) => file.filename.toLowerCase().endsWith(ext))
            );

            const issueReferencePattern =
              /(?:^|[\s(])(?:#\d+|[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+#\d+|https?:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/issues\/\d+)(?=$|[\s).,;:!?])/i;
            const hasIssueReferenceInBody = issueReferencePattern.test(body);

            let hasLinkedIssueInGitHub = false;
            try {
              const linkedIssuesResult = await github.graphql(
                `query ($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 1) {
                        totalCount
                      }
                    }
                  }
                }`,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  number: pr.number,
                }
              );

              hasLinkedIssueInGitHub =
                linkedIssuesResult.repository.pullRequest.closingIssuesReferences.totalCount > 0;
            } catch (error) {
              core.warning(`Unable to query linked issues via GraphQL: ${error}`);
            }

            const hasLinkedIssue = hasIssueReferenceInBody || hasLinkedIssueInGitHub;

            const missingItems = [];
            if (!(hasScreenshotInBody || hasVisualFileInDiff)) {
              missingItems.push(
                'Please add at least one screenshot (or a short screen recording) to show your fix.'
              );
            }
            if (!hasLinkedIssue) {
              missingItems.push(
                'Please link the related issue in the PR description (for example: Related to #123 or Closes #123).'
              );
            }

            if (missingItems.length === 0) {
              core.info('Screenshot and linked issue checks passed, no reminder needed.');
              return;
            }

            const reminderMessage = [
              marker,
              'Thanks for opening this PR.',
              '',
              'Could you please update this PR with the following?',
              ...missingItems.map((item) => `- ${item}`),
              '',
              'These details make review faster and clearer for maintainers.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: reminderMessage,
            });

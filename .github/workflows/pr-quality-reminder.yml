name: PR Quality Reminder

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - edited

permissions:
  pull-requests: read
  issues: write

jobs:
  remind-pr-checklist:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Check screenshots and linked issues in PR
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const marker = '<!-- pr-quality-reminder -->';
            const legacyMarker = '<!-- screenshot-reminder -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const alreadyCommented = comments.some(
              (comment) =>
                comment.user?.type === 'Bot' &&
                (comment.body?.includes(marker) || comment.body?.includes(legacyMarker))
            );

            if (alreadyCommented) {
              core.info('Reminder already posted on this PR.');
              return;
            }

            const hasMarkdownImage = /!\[[^\]]*\]\([^)]+\)/i.test(body);
            const hasHtmlImage = /<img\s+[^>]*src=["'][^"']+["'][^>]*>/i.test(body);
            const screenshotKeywords = /(screenshot|screen shot|screen recording|recording|gif|loom)/i;
            const hasImageUrl = /(https?:\/\/[^\s)]+(?:png|jpe?g|gif|webp|svg|mp4|mov))/i.test(body);

            const hasScreenshotInBody =
              hasMarkdownImage ||
              hasHtmlImage ||
              (screenshotKeywords.test(body) && hasImageUrl);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const imageExtensions = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'];
            const hasImageFileInDiff = files.some((file) =>
              imageExtensions.some((ext) => file.filename.toLowerCase().endsWith(ext))
            );

            const issueLinkPattern =
              /\b(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b[\s:]*(?:https?:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/issues\/\d+|[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+#\d+|#\d+)/i;
            const hasIssueLinkInBody = issueLinkPattern.test(body);

            let hasLinkedIssueInGitHub = false;
            try {
              const linkedIssuesResult = await github.graphql(
                `query ($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 1) {
                        totalCount
                      }
                    }
                  }
                }`,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  number: pr.number,
                }
              );

              hasLinkedIssueInGitHub =
                linkedIssuesResult.repository.pullRequest.closingIssuesReferences.totalCount > 0;
            } catch (error) {
              core.warning(`Unable to query linked issues via GraphQL: ${error}`);
            }

            const hasLinkedIssue = hasIssueLinkInBody || hasLinkedIssueInGitHub;

            const missingItems = [];
            if (!(hasScreenshotInBody || hasImageFileInDiff)) {
              missingItems.push(
                'Please add at least one screenshot (or a short screen recording) to show your fix.'
              );
            }
            if (!hasLinkedIssue) {
              missingItems.push(
                'Please link the related issue in the PR description (for example: Closes #123).'
              );
            }

            if (missingItems.length === 0) {
              core.info('Screenshot and linked issue checks passed, no reminder needed.');
              return;
            }

            const reminderMessage = [
              marker,
              'Thanks for opening this PR.',
              '',
              'Could you please update this PR with the following?',
              ...missingItems.map((item) => `- ${item}`),
              '',
              'These details make review faster and clearer for maintainers.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: reminderMessage,
            });

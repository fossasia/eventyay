name: Video & Backend CI

on:
  pull_request:
    branches: [dev]
    paths:
      - "app/eventyay/webapp/video/**"
      - "app/**.py"
      - "app/**/**.py"
      - "app/pyproject.toml"
      - "app/uv.lock"
      - ".github/workflows/video-backend-ci.yml"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  python-uv-check:
    name: Backend validation (uv + Django checks)
    runs-on: ubuntu-latest
    # All service and DB config is read from eventyay.testing.toml.
    # Only the secret key is kept here to avoid committing it to the TOML.
    env:
      EVY_RUNNING_ENVIRONMENT: testing
      EVY_SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext redis-server

      - name: Start Redis
        run: sudo systemctl start redis-server

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --directory app

      - name: Django system checks
        working-directory: app
        run: uv run python manage.py check

  video-build:
    name: Video build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/eventyay/webapp/video
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/eventyay/webapp/video/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build video
        run: npm run build

  pytest-integration:
    name: Integration tests (pytest)
    runs-on: ubuntu-latest
    needs: python-uv-check
    env:
      EVY_RUNNING_ENVIRONMENT: testing
      EVY_SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext redis-server

      - name: Set up PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER eventyay WITH PASSWORD 'eventyay';"
          sudo -u postgres psql -c 'CREATE DATABASE "eventyay-db" OWNER eventyay;'

      - name: Start Redis
        run: sudo systemctl start redis-server

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --directory app --group test

      - name: Run database migrations
        working-directory: app
        run: uv run python manage.py migrate --noinput

      # tests/stable is a curated subset that passes reliably against the current
      # codebase. The broader tests/ tree contains legacy suites with outstanding
      # failures inherited from the project's history. The path forward is to fix
      # those tests incrementally and re-enable them here, or to quarantine them
      # explicitly with pytest markers in a separate slow/legacy CI job.
      - name: Run pytest
        working-directory: app
        run: uv run pytest tests/stable -v --tb=short

  backend-smoke:
    name: Backend smoke test (healthcheck)
    runs-on: ubuntu-latest
    needs: python-uv-check
    env:
      EVY_RUNNING_ENVIRONMENT: testing
      EVY_SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext redis-server curl

      - name: Set up PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER eventyay WITH PASSWORD 'eventyay';"
          sudo -u postgres psql -c 'CREATE DATABASE "eventyay-db" OWNER eventyay;'

      - name: Start Redis
        run: sudo systemctl start redis-server

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --directory app

      - name: Run migrations
        working-directory: app
        run: uv run python manage.py migrate --noinput

      - name: Start development server
        run: |
          cd app
          uv run python manage.py runserver 0.0.0.0:8000 &
          echo $! > server.pid

      - name: Wait for server and verify healthcheck
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/healthcheck/ >/dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            sleep 2
          done
          response=$(curl -sS -w "\n%{http_code}" http://127.0.0.1:8000/healthcheck/)
          status_code=$(echo "$response" | tail -n1)
          if [ "$status_code" != "200" ]; then
            echo "Healthcheck failed with status: $status_code"
            exit 1
          fi
          echo "Healthcheck passed with status: $status_code"

      - name: Stop server
        if: always()
        run: |
          if [ -f app/server.pid ]; then
            kill -TERM "$(cat app/server.pid)" || true
          fi

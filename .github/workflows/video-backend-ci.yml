name: Video & Backend CI

on:
  pull_request:
    branches: [dev]
    paths:
      - "app/eventyay/webapp/video/**"
      - "app/**.py"
      - "app/**/**.py"
      - "app/pyproject.toml"
      - "app/uv.lock"
      - ".github/workflows/video-backend-ci.yml"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  python-uv-check:
    name: Backend validation (uv + Django checks)
    # Pin to a specific Ubuntu LTS to reduce runner drift; APT package versions may still change over time.
    runs-on: ubuntu-24.04
    # Most service and app config is read from eventyay.testing.toml via EVY_RUNNING_ENVIRONMENT=testing.
    # PostgreSQL uses EVY_POSTGRES_* env vars in other jobs, and Redis uses the code default (redis://localhost/0).
    # Only the environment selector and secret key are set inline here.
    env:
      EVY_RUNNING_ENVIRONMENT: testing
      EVY_SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext redis-server

      - name: Start Redis
        run: |
          sudo systemctl start redis-server
          until redis-cli ping; do sleep 1; done

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --directory app

      - name: Django system checks
        working-directory: app
        run: uv run python manage.py check

  video-build:
    name: Video build (Vite)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app/eventyay/webapp/video
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/eventyay/webapp/video/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build video
        run: npm run build

  pytest-integration:
    name: Integration tests (pytest)
    runs-on: ubuntu-24.04
    needs: python-uv-check
    env:
      EVY_RUNNING_ENVIRONMENT: testing
      EVY_SECRET_KEY: ci-test-secret-key
      # DB connection details are CI-specific and kept out of eventyay.testing.toml
      # so local developer runs continue to use their own peer-auth connection.
      EVY_POSTGRES_USER: eventyay
      EVY_POSTGRES_PASSWORD: eventyay
      EVY_POSTGRES_DB: eventyay-db
      EVY_POSTGRES_HOST: localhost
      EVY_POSTGRES_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext redis-server postgresql-16 postgresql-client-16

      - name: Set up PostgreSQL
        run: |
          sudo systemctl start postgresql
          until pg_isready -h localhost -U postgres; do sleep 1; done
          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname = 'eventyay';" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER eventyay WITH PASSWORD 'eventyay' CREATEDB;"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'eventyay-db';" | grep -q 1 || \
            sudo -u postgres psql -c 'CREATE DATABASE "eventyay-db" OWNER eventyay;'

      - name: Start Redis
        run: |
          sudo systemctl start redis-server
          until redis-cli ping; do sleep 1; done

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --directory app --group test

      - name: Run database migrations
        working-directory: app
        run: uv run python manage.py migrate --noinput

      # tests/stable is a curated subset that passes reliably against the current
      # codebase. The broader tests/ tree contains legacy suites with outstanding
      # failures inherited from the project's history. The path forward is to fix
      # those tests incrementally and re-enable them here, or to quarantine them
      # explicitly with pytest markers in a separate slow/legacy CI job.
      - name: Run pytest
        working-directory: app
        run: uv run pytest tests/stable -v --tb=short

  backend-smoke:
    name: Backend smoke test (healthcheck)
    runs-on: ubuntu-24.04
    needs: python-uv-check
    env:
      EVY_RUNNING_ENVIRONMENT: testing
      EVY_SECRET_KEY: ci-test-secret-key
      EVY_POSTGRES_USER: eventyay
      EVY_POSTGRES_PASSWORD: eventyay
      EVY_POSTGRES_DB: eventyay-db
      EVY_POSTGRES_HOST: localhost
      EVY_POSTGRES_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext redis-server postgresql-16 postgresql-client-16 curl

      - name: Set up PostgreSQL
        run: |
          sudo systemctl start postgresql
          until pg_isready -h localhost -U postgres; do sleep 1; done
          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname = 'eventyay';" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER eventyay WITH PASSWORD 'eventyay' CREATEDB;"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'eventyay-db';" | grep -q 1 || \
            sudo -u postgres psql -c 'CREATE DATABASE "eventyay-db" OWNER eventyay;'

      - name: Start Redis
        run: |
          sudo systemctl start redis-server
          until redis-cli ping; do sleep 1; done

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --directory app

      - name: Run migrations
        working-directory: app
        run: uv run python manage.py migrate --noinput

      - name: Start development server
        run: |
          cd app
          uv run python manage.py runserver 0.0.0.0:8000 &
          echo $! > server.pid

      - name: Wait for server and verify healthcheck
        # Use `localhost` (not 127.0.0.1) so MultiDomainMiddleware accepts the
        # request: it compares the Host header against SITE_URL which defaults
        # to http://localhost:8000.
        run: |
          for _ in {1..30}; do
            if curl -fsS http://localhost:8000/healthcheck/ >/dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            sleep 2
          done
          response=$(curl -sS -w "\n%{http_code}" http://localhost:8000/healthcheck/)
          status_code=$(echo "$response" | tail -n1)
          if [ "$status_code" != "200" ]; then
            echo "Healthcheck failed with status: $status_code"
            exit 1
          fi
          echo "Healthcheck passed with status: $status_code"

      - name: Stop server
        if: always()
        run: |
          if [ -f app/server.pid ]; then
            kill -TERM "$(cat app/server.pid)" || true
          fi

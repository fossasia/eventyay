name: Test Collection Check

on:
  push:
    branches: [migrateImports, enext]
    paths:
      - 'app/tests/**'
      - 'app/eventyay/**'
      - 'app/pyproject.toml'
  pull_request:
    branches: [enext]
    paths:
      - 'app/tests/**'
      - 'app/eventyay/**'
      - 'app/pyproject.toml'

jobs:
  collect:
    name: Verify test collection (no import errors)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: harmon758/postgresql-action@v1
        with:
          postgresql version: '16'
          postgresql db: 'eventyay'
          postgresql user: 'postgres'
          postgresql password: 'postgres'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y gettext

      - name: Install Python dependencies
        working-directory: ./app
        run: uv sync --group test --no-editable

      - name: Collect tickets tests (verify no import errors)
        working-directory: ./app
        run: uv run pytest --collect-only tests/tickets/ -q
        env:
          EVY_POSTGRES_HOST: localhost
          EVY_POSTGRES_PORT: 5432
          EVY_POSTGRES_USER: postgres
          EVY_POSTGRES_DB: eventyay
          GITHUB_WORKFLOW: true

name: Docker PR Build (dev/main)

on:
  pull_request:
    branches: [ dev, main ]

jobs:
  check_translations:
    name: Validate translation files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gettext
        run: sudo apt-get update -qq && sudo apt-get install -y gettext

      - name: Check .po files with msgfmt
        run: |
          failed=0
          while IFS= read -r f; do
            if ! msgfmt --check-format "$f" -o /dev/null; then
              echo "FAIL: $f"
              failed=1
            fi
          done < <(find app/eventyay/locale -name '*.po')
          if [ $failed -ne 0 ]; then
            echo "One or more .po files failed msgfmt validation."
            exit 1
          fi
          echo "All .po files passed msgfmt validation."

  build_docker_image:
    name: Build Docker image for dev PR
    runs-on: ubuntu-latest
    needs: check_translations
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@2b51285047da1547ffb1b2203d8be4c0af6b1f20

      - name: Swap exhibition plugin branch for environment
        working-directory: app
        run: |
          if [ "${{ github.ref_name }}" = "dev" ] || [ "${{ github.base_ref }}" = "dev" ]; then
            sed -i 's/eventyay-exhibition.git@[a-zA-Z0-9_-]*/eventyay-exhibition.git@dev/' pyproject.toml
            pip install uv
            uv lock
          fi

      - name: Build Docker image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85
        with:
          context: ./app
          file: ./app/Dockerfile.prod
          push: false
          tags: eventyay-next:${{ github.sha }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.EVENTYAY_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

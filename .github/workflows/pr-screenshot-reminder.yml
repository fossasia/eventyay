name: PR Screenshot Reminder

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  remind-screenshots:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for screenshots in PR
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const marker = '<!-- screenshot-reminder -->';

            const hasMarkdownImage = /!\[[^\]]*\]\((https?:\/\/|\/)[^)]+\)/i.test(body);
            const hasHtmlImage = /<img\s+[^>]*src=["'][^"']+["'][^>]*>/i.test(body);
            const screenshotKeywords = /(screenshot|screen shot|screen recording|recording|gif|loom)/i;
            const hasImageUrl = /(https?:\/\/[^\s)]+(?:png|jpe?g|gif|webp|svg|mp4|mov))/i.test(body);

            const hasScreenshotInBody =
              hasMarkdownImage ||
              hasHtmlImage ||
              (screenshotKeywords.test(body) && hasImageUrl);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const imageExtensions = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'];
            const hasImageFileInDiff = files.some((file) =>
              imageExtensions.some((ext) => file.filename.toLowerCase().endsWith(ext))
            );

            if (hasScreenshotInBody || hasImageFileInDiff) {
              core.info('Screenshot evidence found, no reminder needed.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const alreadyCommented = comments.some(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (alreadyCommented) {
              core.info('Reminder already posted on this PR.');
              return;
            }

            const reminderMessage = [
              marker,
              'Thanks for opening this PR.',
              '',
              'Could you please add at least one screenshot (or a short screen recording) to show your fix?',
              'It helps reviewers quickly understand and validate the UI changes.',
              '',
              'If this PR has no visual changes, you can mention that in the PR description.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: reminderMessage,
            });
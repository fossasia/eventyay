{% load i18n %}

{% if not omit_wrapper %}<div class="submit-group search-submit-group">{% endif %}
<form class="search-form{% if not no_filter_form %} filter-form{% endif %}"{% if form_id %} id="{{ form_id }}"{% endif %} role="search">
  {% if filter_form %}{{ filter_form }}{% endif %}
  {% if search_form %}{{ search_form }}{% endif %}
  <button class="btn-info" type="submit">{% translate "Search" %}</button>
</form>
{% if not omit_wrapper %}</div>{% endif %}

{% load thumbnail %}
<span class="user-name-display">
  {{ user.get_display_name }}
  {% if not request.event or request.event.cfp.request_avatar %}
    {% if user.has_avatar %}
      {% if lightbox %}<a href="{{ user.avatar_url }}" data-lightbox>{% endif %}
      <img loading="lazy" src="{% if user.avatar %}{{ user.avatar|thumbnail:'tiny' }}{% else %}{{ user.avatar_url }}{% endif %}">
      {% if lightbox %}</a>{% endif %}
    {% endif %}
  {% endif %}
</span>

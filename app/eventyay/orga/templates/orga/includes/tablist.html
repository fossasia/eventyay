{% load compress %}
{% load static %}

<div role="tablist">
  {% for name, label in tablist.items %}
    {% if active_tab == name or not active_tab and forloop.first %}
      <input role="tab" type="radio" id="tab-{{ name }}" name="tablist" aria-controls="tabpanel-{{ name }}" aria-selected="true" checked>
    {% else %}
      <input role="tab" type="radio" id="tab-{{ name }}" name="tablist" aria-controls="tabpanel-{{ name }}" aria-selected="false">
    {% endif %}
    <label for="tab-{{ name }}">{{ label }}</label>
  {% endfor %}
</div>

{% compress js %}
  <script defer src="{% static "common/js/tabs.js" %}"></script>
{% endcompress %}

# In testing, we use the in-memory email backend,
# because we do assertions on sent emails and we want to throw away emails after tests.
email_backend = 'django.core.mail.backends.locmem.EmailBackend'

celery_always_eager = true
debug = true

# PostgreSQL connection used by CI and local test runs.
# To use a different setup locally, override any of these in eventyay.local.toml.
postgres_user = "eventyay"
postgres_password = "eventyay"
postgres_db = "eventyay-db"
postgres_host = "localhost"
postgres_port = 5432
# redis_url is intentionally omitted: the default (redis://localhost/0) already
# resolves to port 6379, which matches the standard local and CI Redis setup.

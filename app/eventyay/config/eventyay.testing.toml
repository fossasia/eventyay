# In testing, we use the in-memory email backend,
# because we do assertions on sent emails and we want to throw away emails after tests.
email_backend = 'django.core.mail.backends.locmem.EmailBackend'

celery_always_eager = true
debug = true

# PostgreSQL connection settings are intentionally absent here.
# Local test runs continue to use the default peer-auth connection (postgres_user /
# postgres_host / postgres_port are None by default, which triggers peer auth).
# CI jobs provide their own connection details via EVY_POSTGRES_* env vars set at
# the job level in the workflow, keeping this shared TOML developer-friendly.

{% load i18n %}
<form id="checkout-login-form" method="post" action="{% url 'eventyay_common:auth.login' %}">
  {% csrf_token %}
  <input type="hidden" name="next" id="checkout-next-url" value="">

  <div class="form-group">
    <label for="checkout-email">{% translate 'E-mail' %}</label>
    <input type="email"
           id="checkout-email"
           name="email"
           class="form-control"
           required
           autocomplete="email"
           placeholder="{% translate 'Enter your email' %}">
  </div>

  <div class="form-group">
    <label for="checkout-password">{% translate 'Password' %}</label>
    <input type="password"
           id="checkout-password"
           name="password"
           class="form-control"
           required
           autocomplete="current-password"
           placeholder="{% translate 'Enter your password' %}">
  </div>

  <div class="form-group">
    <label class="checkbox-inline">
      <input type="checkbox" name="keep_logged_in" value="1"> {% translate 'Keep me logged in' %}
    </label>
  </div>

  {% if can_reset %}
    <div class="form-group">
      <a href="{% url 'eventyay_common:auth.forgot' %}"
         class="btn btn-link btn-block checkout-forgot-password"
         id="checkout-forgot-password-link"
         rel="noopener noreferrer">
        {% translate 'Lost password?' %}
      </a>
    </div>
  {% endif %}

  <div id="checkout-login-error" class="alert alert-danger" style="display: none;"></div>

  <button type="submit" class="btn btn-primary btn-lg btn-block" id="checkout-login-submit">
    <i class="fa fa-sign-in" aria-hidden="true"></i> {% translate 'Log in' %}
  </button>
</form>

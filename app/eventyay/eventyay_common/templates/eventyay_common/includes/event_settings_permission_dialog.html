{% load i18n %}
<dialog id="event-settings-permission-dialog" class="permission-required-dialog" aria-labelledby="{{ dialog_title_id|default:'event-settings-permission-dialog-title' }}">
  <form method="dialog" class="modal-card-stacked-permission">
    <p class="modal-card-stacked-permission__icon">
      <i class="fa fa-lock" aria-hidden="true"></i>
    </p>
    <h3 id="{{ dialog_title_id|default:'event-settings-permission-dialog-title' }}">{% trans "Permission Required" %}</h3>
    <p class="modal-card-stacked-permission__message">
      {% trans "You require additional permissions to change event visibility settings. Please contact the main event organisers." %}
    </p>
    <button type="submit" class="btn btn-primary">{% trans "Ok" %}</button>
  </form>
</dialog>
